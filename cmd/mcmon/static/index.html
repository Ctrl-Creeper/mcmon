<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MC Latency Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2"></script>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:0;color:#111;background:#fafafa;}
  .wrap{max-width:1100px;margin:0 auto;padding:24px;}
  nav{background:#fff;border-bottom:1px solid #ddd;padding:0 24px;display:flex;gap:24px;align-items:center;}
  nav a{text-decoration:none;color:#444;padding:12px 0;font-size:15px;border-bottom:2px solid transparent;}
  nav a.active{color:#111;font-weight:600;border-bottom-color:#111;}
  nav .logo{font-weight:700;color:#111;font-size:16px;margin-right:12px;}
  .card{border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:16px;background:#fff;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{padding:6px 10px;border:1px solid #ccc;border-radius:10px;background:#fff;cursor:pointer;font-size:13px;}
  .btn.active{border-color:#111;font-weight:700;}
  select{padding:6px 10px;border-radius:10px;border:1px solid #ccc;}
  .muted{color:#666;font-size:13px;}
  canvas{max-width:100%;}
</style>
</head>
<body>

<nav>
  <span class="logo">MCMon</span>
  <a href="/" class="active">Graphs</a>
  <a href="/servers.html">Servers</a>
</nav>

<div class="wrap">

<div class="card">
  <div class="row">
    <div>Target:</div>
    <select id="targetSelect"></select>
    <div class="row" id="rangeButtons"></div>
    <button class="btn" id="resetZoom">Reset zoom</button>
  </div>
</div>

<div class="card">
  <canvas id="chart" height="100"></canvas>
  <div class="muted" style="margin-top:10px;">
    Shaded band: min~max; green line: median; red bars: loss %.
    <strong>Scroll</strong> to zoom, <strong>drag</strong> to pan, <strong>Shift+drag</strong> to box-zoom. Double-click or button to reset.
  </div>
</div>

</div>

<script>
const ranges = ['1h','6h','12h','1d','7d','30d'];
let currentRange = '1h';
let currentTarget = null;
let chart = null;

async function loadTargets() {
  const targets = await fetch('/api/targets').then(r => r.json()) || [];
  const sel = document.getElementById('targetSelect');
  const prev = currentTarget;
  sel.innerHTML = '';
  targets.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name || t.id;
    sel.appendChild(opt);
  });
  if (targets.find(t => t.id === prev)) currentTarget = prev;
  else currentTarget = targets.length ? targets[0].id : null;
  sel.value = currentTarget || '';
  sel.onchange = () => { currentTarget = sel.value; refresh(); };
}

function renderRangeButtons() {
  const c = document.getElementById('rangeButtons');
  c.innerHTML = '';
  ranges.forEach(r => {
    const b = document.createElement('button');
    b.className = 'btn' + (r === currentRange ? ' active' : '');
    b.textContent = r;
    b.onclick = () => { currentRange = r; renderRangeButtons(); refresh(); };
    c.appendChild(b);
  });
}

document.getElementById('resetZoom').onclick = () => { if (chart) chart.resetZoom(); };

async function refresh() {
  if (!currentTarget) { if (chart) { chart.destroy(); chart = null; } return; }
  const data = await fetch(`/api/series?target=${encodeURIComponent(currentTarget)}&range=${currentRange}`).then(r => r.json());
  const labels = (data || []).map(d => new Date(d.Ts * 1000).toLocaleString());
  const minD = (data || []).map(d => d.Min);
  const p50  = (data || []).map(d => d.P50);
  const maxD = (data || []).map(d => d.Max);
  const loss = (data || []).map(d => d.LossPct * 100);

  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'max', data: maxD, borderColor: 'rgba(150,150,150,0.4)', backgroundColor: 'rgba(200,200,200,0.25)', fill: '+1', pointRadius: 0, yAxisID: 'y' },
        { label: 'min', data: minD, borderColor: 'rgba(150,150,150,0.4)', backgroundColor: 'rgba(200,200,200,0.25)', fill: false, pointRadius: 0, yAxisID: 'y' },
        { label: 'median', data: p50, borderColor: '#00a000', borderWidth: 2, backgroundColor: 'transparent', pointRadius: 0, yAxisID: 'y' },
        { label: 'loss %', data: loss, type: 'bar', backgroundColor: 'rgba(255,0,0,0.4)', yAxisID: 'y1' },
      ]
    },
    options: {
      animation: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y:  { title: { display: true, text: 'ms' }, min: 0 },
        y1: { position: 'right', min: 0, max: 100, title: { display: true, text: 'loss %' }, grid: { drawOnChartArea: false } },
      },
      plugins: {
        zoom: {
          pan: { enabled: true, mode: 'x' },
          zoom: {
            wheel: { enabled: true, speed: 0.05 },
            pinch: { enabled: true },
            drag: { enabled: true, backgroundColor: 'rgba(0,128,0,0.1)', borderColor: '#00a000', borderWidth: 1, modifierKey: 'shift' },
            mode: 'x',
          },
        },
      },
    },
  });
}

(async () => {
  await loadTargets();
  renderRangeButtons();
  await refresh();
  setInterval(refresh, 30000);
  setInterval(loadTargets, 60000);
})();
</script>

</body>
</html>
