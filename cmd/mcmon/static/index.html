<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MC Latency Monitor</title>
<link rel="stylesheet" href="/style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; }
  .server-card { cursor: pointer; position: relative; }
  .server-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .server-card .header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .server-card .name { font-size: 15px; font-weight: 600; }
  .server-card .host { font-size: 12px; color: var(--text-faint); }
  .server-card .mini-stats { display: flex; gap: 16px; margin-bottom: 8px; font-size: 12px; }
  .server-card .mini-stats .val { font-weight: 600; }
  .server-card .mini-stats .val.green { color: var(--green); }
  .server-card .mini-stats .val.red { color: var(--red); }
  .server-card .chart-container { height: 120px; }
  .server-card .click-hint {
    position: absolute; top: 12px; right: 16px;
    font-size: 11px; color: var(--text-faint);
    opacity: 0; transition: opacity 0.2s;
  }
  .server-card:hover .click-hint { opacity: 1; }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-faint);
  }
  .empty-state a { color: var(--accent); }
  @media (max-width: 560px) { .server-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <span class="logo">⚡ MCMon</span>
  <a href="/" class="active">Dashboard</a>
  <a href="/servers.html">Servers</a>
  <span class="spacer"></span>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="wrap">

<!-- Summary stats -->
<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="stat-label">Servers</div><div class="stat-value accent" id="statTotal">-</div></div>
  <div class="stat-card"><div class="stat-label">Online</div><div class="stat-value green" id="statOnline">-</div></div>
  <div class="stat-card"><div class="stat-label">Offline</div><div class="stat-value red" id="statOffline">-</div></div>
  <div class="stat-card"><div class="stat-label">Avg Median</div><div class="stat-value" id="statAvgMedian">-</div></div>
</div>

<!-- Server grid -->
<div class="server-grid" id="grid"></div>
<div class="empty-state" id="emptyState" style="display:none;">
  No servers configured yet. <a href="/servers.html">Add one →</a>
</div>

</div>

<script>
// ===== Theme =====
const themeBtn = document.getElementById('themeBtn');
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('mcmon-theme', dark ? 'dark' : 'light');
}
themeBtn.onclick = () => { applyTheme(!document.body.classList.contains('dark')); renderAll(); };
applyTheme(localStorage.getItem('mcmon-theme') === 'dark' || (!localStorage.getItem('mcmon-theme') && matchMedia('(prefers-color-scheme:dark)').matches));

function chartColors() {
  const dark = document.body.classList.contains('dark');
  return {
    band: dark ? 'rgba(140,120,255,0.15)' : 'rgba(100,80,200,0.12)',
    bandBorder: dark ? 'rgba(140,120,255,0.3)' : 'rgba(100,80,200,0.25)',
    median: dark ? '#8be98b' : '#00a040',
    loss: dark ? 'rgba(255,80,80,0.5)' : 'rgba(220,40,40,0.4)',
    grid: dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    tick: dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)',
  };
}

let targets = [];
let seriesCache = {};
let charts = {};

async function loadAll() {
  targets = await fetch('/api/targets').then(r => r.json()) || [];
  if (!Array.isArray(targets)) targets = [];

  await Promise.all(targets.map(async t => {
    const data = await fetch(`/api/series?target=${encodeURIComponent(t.id)}&range=1h`).then(r => r.json());
    seriesCache[t.id] = data || [];
  }));

  updateStats();
  renderAll();
}

function updateStats() {
  document.getElementById('statTotal').textContent = targets.length;
  let online = 0, offline = 0, medianSum = 0, medianCount = 0;
  targets.forEach(t => {
    const arr = seriesCache[t.id] || [];
    const last = arr.length ? arr[arr.length - 1] : null;
    if (last && last.P50 != null && last.LossPct < 1) {
      online++;
      medianSum += last.P50;
      medianCount++;
    } else {
      offline++;
    }
  });
  document.getElementById('statOnline').textContent = online;
  document.getElementById('statOffline').textContent = offline;
  const offEl = document.getElementById('statOffline');
  offEl.className = 'stat-value ' + (offline > 0 ? 'red' : '');
  document.getElementById('statAvgMedian').textContent = medianCount ? (medianSum / medianCount).toFixed(1) + ' ms' : '—';
}

function renderAll() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');

  if (targets.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  grid.innerHTML = '';
  targets.forEach(t => {
    const arr = seriesCache[t.id] || [];
    const last = arr.length ? arr[arr.length - 1] : null;
    const isOnline = last && last.P50 != null && last.LossPct < 1;
    const p50 = last && last.P50 != null ? last.P50.toFixed(1) + ' ms' : '—';
    const lossAvg = arr.length ? (arr.reduce((s, d) => s + d.LossPct, 0) / arr.length * 100).toFixed(1) + '%' : '—';

    const card = document.createElement('div');
    card.className = 'card server-card';
    card.onclick = () => { window.location.href = `/detail.html?id=${encodeURIComponent(t.id)}`; };
    card.innerHTML = `
      <span class="click-hint">Click for details →</span>
      <div class="header">
        <span class="dot ${isOnline ? 'online' : 'offline'}"></span>
        <span class="name">${esc(t.name || t.id)}</span>
        <span class="host">${esc(t.host)}:${t.port}</span>
      </div>
      <div class="mini-stats">
        <span>Median: <span class="val ${isOnline ? 'green' : 'red'}">${p50}</span></span>
        <span>Loss: <span class="val ${parseFloat(lossAvg) < 1 ? 'green' : 'red'}">${lossAvg}</span></span>
        <span>Interval: <span class="val">${t.interval_sec}s</span></span>
      </div>
      <div class="chart-container"><canvas id="chart-${t.id}"></canvas></div>
    `;
    grid.appendChild(card);

    renderMiniChart(t.id, arr);
  });
}

function renderMiniChart(id, arr) {
  const canvas = document.getElementById('chart-' + id);
  if (!canvas) return;
  const cc = chartColors();

  const labels = arr.map(d => {
    const dt = new Date(d.Ts * 1000);
    return dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0');
  });
  const minD = arr.map(d => d.Min);
  const p50  = arr.map(d => d.P50);
  const maxD = arr.map(d => d.Max);

  charts[id] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { data: maxD, borderColor: cc.bandBorder, backgroundColor: cc.band, fill: '+1', pointRadius: 0, borderWidth: 0.5 },
        { data: minD, borderColor: cc.bandBorder, backgroundColor: 'transparent', fill: false, pointRadius: 0, borderWidth: 0.5 },
        { data: p50, borderColor: cc.median, borderWidth: 1.5, backgroundColor: 'transparent', pointRadius: 0, tension: 0.3 },
      ]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { display: false },
        y: { display: false, min: 0 },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.8)', titleFont: { size: 11 }, bodyFont: { size: 11 },
          cornerRadius: 6, padding: 8,
          callbacks: {
            label: ctx => {
              const names = ['max', 'min', 'median'];
              return names[ctx.datasetIndex] + ': ' + (ctx.raw != null ? ctx.raw.toFixed(1) + ' ms' : '—');
            }
          }
        },
      },
    },
  });
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

(async () => {
  await loadAll();
  setInterval(loadAll, 30000);
})();
</script>

</body>
</html>
