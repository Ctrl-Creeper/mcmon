name: desktop

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: ./scripts/build-desktop.sh
      - uses: actions/upload-artifact@v4
        with:
          name: mc-latency-monitor-macos-arm64
          path: build/bin/*.app

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: .\scripts\build-desktop.ps1
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: mc-latency-monitor-windows-amd64
          path: build/bin/*

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
      - run: ./scripts/build-desktop.sh
      - uses: actions/upload-artifact@v4
        with:
          name: mc-latency-monitor-linux-amd64
          path: build/bin/*
