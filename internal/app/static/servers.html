<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Servers - mcmon</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<nav>
  <span class="logo">⚡ MCMon</span>
  <a href="/">Dashboard</a>
  <a href="/servers.html" class="active">Servers</a>
  <a href="/remote.html">Remote</a>
  <a href="/settings.html">Settings</a>
  <span class="spacer"></span>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="wrap">

<!-- Server list -->
<div class="card">
  <div class="card-header">
    <h2>Servers</h2>
    <div class="row">
      <button class="btn primary" id="btnExport">↓ Export selected</button>
      <button class="btn primary" id="btnImportOpen">↑ Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </div>
  <table id="targetsTable">
    <thead><tr>
      <th style="width:32px"><input type="checkbox" id="selectAll"></th>
      <th>Status</th><th>Name</th><th>Host</th><th>Enabled monitors</th><th>Timeout</th><th></th>
    </tr></thead>
    <tbody></tbody>
  </table>
  <div class="muted" style="margin-top:10px;" id="selectInfo">Select servers to export their configuration.</div>
</div>

<!-- Add / edit form -->
<div class="card" id="formCard">
  <div class="card-header">
    <h2 id="formTitle">Add server</h2>
  </div>
  <form id="targetForm">
    <input type="hidden" id="f_editId">
    <div class="row" style="margin-bottom:12px;">
      <label>Name<input type="text" id="f_name" required placeholder="My Server"></label>
      <label>Host<input type="text" id="f_host" required placeholder="mc.example.com"></label>
      <label>Port<input type="number" id="f_port" required value="25565"></label>
    </div>
    <div class="row" style="margin-bottom:16px;">
      <label>Timeout (ms)<input type="number" id="f_timeout" required value="1500" min="100"></label>
    </div>
    <div class="monitor-settings">
      <div class="monitor-row">
        <label class="check-label"><input type="checkbox" id="m_online_enabled" checked> Online</label>
        <label>Interval (sec)<input type="number" id="m_online_interval" value="60" min="5"></label>
      </div>
      <div class="monitor-row">
        <label class="check-label"><input type="checkbox" id="m_players_enabled" checked> Players</label>
        <label>Interval (sec)<input type="number" id="m_players_interval" value="60" min="5"></label>
      </div>
      <div class="monitor-row">
        <label class="check-label"><input type="checkbox" id="m_latency_enabled" checked> Latency</label>
        <label>Interval (sec)<input type="number" id="m_latency_interval" value="60" min="5"></label>
        <label>Probes / burst<input type="number" id="m_latency_burst" value="5" min="1" max="20"></label>
        <label>Probe gap (ms)<input type="number" id="m_latency_gap" value="1500" min="0"></label>
        <label>Protocol ver.<input type="number" id="m_latency_proto" value="760"></label>
      </div>
      <div class="monitor-row">
        <label class="check-label"><input type="checkbox" id="m_loss_enabled" checked> Loss</label>
        <label>Interval (sec)<input type="number" id="m_loss_interval" value="60" min="5"></label>
        <label>Probes / burst<input type="number" id="m_loss_burst" value="5" min="1" max="20"></label>
        <label>Probe gap (ms)<input type="number" id="m_loss_gap" value="1500" min="0"></label>
      </div>
    </div>
    <div class="row">
      <button class="btn primary" type="submit" id="f_submit">Add server</button>
      <button class="btn" type="button" id="f_cancel" style="display:none">Cancel</button>
    </div>
  </form>
  <div class="err" id="formErr"></div>
  <div class="ok" id="formOk"></div>
</div>

</div>

<!-- Import modal -->
<div class="modal-bg" id="importModal">
  <div class="modal">
    <h3>Import servers</h3>
    <p class="muted" style="margin-bottom:12px;">Select which servers to import. Existing servers with the same ID will be overwritten.</p>
    <table id="importTable">
      <thead><tr><th style="width:32px"><input type="checkbox" id="importSelectAll" checked></th><th>Name</th><th>Host</th><th>Interval</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="err" id="importErr"></div>
    <div class="row" style="justify-content:flex-end;margin-top:16px;">
      <button class="btn" id="importCancel">Cancel</button>
      <button class="btn primary" id="importConfirm">Import selected</button>
    </div>
  </div>
</div>

<script>
// ===== Theme =====
const themeBtn = document.getElementById('themeBtn');
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('mcmon-theme', dark ? 'dark' : 'light');
}
themeBtn.onclick = () => applyTheme(!document.body.classList.contains('dark'));
applyTheme(localStorage.getItem('mcmon-theme') === 'dark' || (!localStorage.getItem('mcmon-theme') && matchMedia('(prefers-color-scheme:dark)').matches));

// ===== State =====
let targetsCache = [];
let onlineCache = {};
let selected = new Set();
let importData = [];
let importSelected = new Set();

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ===== Server list =====
async function loadTargets() {
  targetsCache = await fetch('/api/targets').then(r => r.json()) || [];
  if (!Array.isArray(targetsCache)) targetsCache = [];
  onlineCache = {};
  await Promise.all(targetsCache.map(async t => {
    if (!monitorDefaults(t).online.enabled) return;
    const data = await fetch(`/api/metrics?target=${encodeURIComponent(t.id)}&metric=online&range=1h`).then(r => r.json());
    const arr = Array.isArray(data) ? data : [];
    onlineCache[t.id] = arr.length ? arr[arr.length - 1] : null;
  }));
  selected = new Set(Array.from(selected).filter(id => targetsCache.some(t => t.id === id)));
  renderTable();
}

function renderTable() {
  const tbody = document.querySelector('#targetsTable tbody');
  tbody.innerHTML = '';
  targetsCache.forEach(t => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" class="sel" data-id="${t.id}" ${selected.has(t.id)?'checked':''}></td>
      <td><span class="dot ${statusClass(t)}"></span></td>
      <td><strong>${esc(t.name || t.id)}</strong></td>
      <td>${esc(t.host)}:${t.port}</td>
      <td>${enabledMonitorLabels(t).join(', ') || 'None'}</td>
      <td>${t.timeout_ms}ms</td>
      <td class="row">
        <button class="btn ghost" data-edit="${t.id}">Edit</button>
        <button class="btn danger" data-del="${t.id}">Delete</button>
      </td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('.sel').forEach(cb => cb.onchange = () => {
    if (cb.checked) selected.add(cb.dataset.id); else selected.delete(cb.dataset.id);
    updateSelectInfo();
  });
  tbody.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => fillForm(b.dataset.edit));
  tbody.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteTarget(b.dataset.del));
  document.getElementById('selectAll').checked = targetsCache.length > 0 && selected.size === targetsCache.length;
  updateSelectInfo();
}

function statusClass(t) {
  if (!monitorDefaults(t).online.enabled) return 'unknown';
  const last = onlineCache[t.id];
  if (!last) return 'unknown';
  return last.Value === 1 ? 'online' : 'offline';
}

function monitorDefaults(t) {
  const legacyInterval = t.interval_sec || 60;
  const legacyBurst = t.probes_per_burst || 5;
  const legacyGap = t.probe_gap_ms ?? 1500;
  const legacyProto = t.protocol_version || 760;
  const m = t.monitors || {};
  return {
    online: { enabled: true, interval_sec: legacyInterval, ...(m.online || {}) },
    players: { enabled: true, interval_sec: legacyInterval, ...(m.players || {}) },
    latency: { enabled: true, interval_sec: legacyInterval, probes_per_burst: legacyBurst, probe_gap_ms: legacyGap, protocol_version: legacyProto, ...(m.latency || {}) },
    loss: { enabled: true, interval_sec: legacyInterval, probes_per_burst: legacyBurst, probe_gap_ms: legacyGap, protocol_version: legacyProto, ...(m.loss || {}) },
  };
}

function enabledMonitorLabels(t) {
  const m = monitorDefaults(t);
  return [
    m.online.enabled ? 'Online' : null,
    m.players.enabled ? 'Players' : null,
    m.latency.enabled ? 'Latency' : null,
    m.loss.enabled ? 'Loss' : null,
  ].filter(Boolean);
}

function updateSelectInfo() {
  document.getElementById('selectInfo').textContent = selected.size
    ? `${selected.size} server(s) selected for export.`
    : 'Select servers to export their configuration.';
}

document.getElementById('selectAll').onchange = function() {
  if (this.checked) targetsCache.forEach(t => selected.add(t.id));
  else selected.clear();
  renderTable();
};

// ===== Add / edit form =====
function fillForm(id) {
  const t = targetsCache.find(x => x.id === id);
  if (!t) return;
  document.getElementById('f_editId').value = t.id;
  document.getElementById('f_name').value = t.name || '';
  document.getElementById('f_host').value = t.host;
  document.getElementById('f_port').value = t.port;
  document.getElementById('f_timeout').value = t.timeout_ms;
  const m = monitorDefaults(t);
  setMonitorForm(m);
  document.getElementById('formTitle').textContent = 'Edit server';
  document.getElementById('f_submit').textContent = 'Save changes';
  document.getElementById('f_cancel').style.display = '';
  document.getElementById('formErr').textContent = '';
  document.getElementById('formOk').textContent = '';
  document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetForm() {
  document.getElementById('targetForm').reset();
  document.getElementById('f_editId').value = '';
  document.getElementById('f_timeout').value = 1500;
  setMonitorForm(monitorDefaults({}));
  document.getElementById('formTitle').textContent = 'Add server';
  document.getElementById('f_submit').textContent = 'Add server';
  document.getElementById('f_cancel').style.display = 'none';
  document.getElementById('formErr').textContent = '';
  document.getElementById('formOk').textContent = '';
}

function setMonitorForm(m) {
  document.getElementById('m_online_enabled').checked = !!m.online.enabled;
  document.getElementById('m_online_interval').value = m.online.interval_sec || 60;
  document.getElementById('m_players_enabled').checked = !!m.players.enabled;
  document.getElementById('m_players_interval').value = m.players.interval_sec || 60;
  document.getElementById('m_latency_enabled').checked = !!m.latency.enabled;
  document.getElementById('m_latency_interval').value = m.latency.interval_sec || 60;
  document.getElementById('m_latency_burst').value = m.latency.probes_per_burst || 5;
  document.getElementById('m_latency_gap').value = m.latency.probe_gap_ms ?? 1500;
  document.getElementById('m_latency_proto').value = m.latency.protocol_version || 760;
  document.getElementById('m_loss_enabled').checked = !!m.loss.enabled;
  document.getElementById('m_loss_interval').value = m.loss.interval_sec || 60;
  document.getElementById('m_loss_burst').value = m.loss.probes_per_burst || 5;
  document.getElementById('m_loss_gap').value = m.loss.probe_gap_ms ?? 1500;
}

function readMonitorForm() {
  return {
    online: {
      enabled: document.getElementById('m_online_enabled').checked,
      interval_sec: parseInt(document.getElementById('m_online_interval').value, 10),
    },
    players: {
      enabled: document.getElementById('m_players_enabled').checked,
      interval_sec: parseInt(document.getElementById('m_players_interval').value, 10),
    },
    latency: {
      enabled: document.getElementById('m_latency_enabled').checked,
      interval_sec: parseInt(document.getElementById('m_latency_interval').value, 10),
      probes_per_burst: parseInt(document.getElementById('m_latency_burst').value, 10),
      probe_gap_ms: parseInt(document.getElementById('m_latency_gap').value, 10),
      protocol_version: parseInt(document.getElementById('m_latency_proto').value, 10),
    },
    loss: {
      enabled: document.getElementById('m_loss_enabled').checked,
      interval_sec: parseInt(document.getElementById('m_loss_interval').value, 10),
      probes_per_burst: parseInt(document.getElementById('m_loss_burst').value, 10),
      probe_gap_ms: parseInt(document.getElementById('m_loss_gap').value, 10),
    },
  };
}

document.getElementById('f_cancel').onclick = resetForm;

document.getElementById('targetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('formErr').textContent = '';
  document.getElementById('formOk').textContent = '';
  const editId = document.getElementById('f_editId').value;
  const payload = {
    name: document.getElementById('f_name').value.trim(),
    host: document.getElementById('f_host').value.trim(),
    port: parseInt(document.getElementById('f_port').value, 10),
    timeout_ms: parseInt(document.getElementById('f_timeout').value, 10),
    monitors: readMonitorForm(),
  };
  payload.interval_sec = payload.monitors.latency.interval_sec;
  payload.probes_per_burst = payload.monitors.latency.probes_per_burst;
  payload.probe_gap_ms = payload.monitors.latency.probe_gap_ms;
  payload.protocol_version = payload.monitors.latency.protocol_version;
  let url, method;
  if (editId) {
    payload.id = editId;
    url = `/api/targets/${encodeURIComponent(editId)}`;
    method = 'PUT';
  } else {
    url = '/api/targets';
    method = 'POST';
  }
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (!res.ok) {
    document.getElementById('formErr').textContent = await res.text();
    return;
  }
  document.getElementById('formOk').textContent = editId ? 'Server updated.' : 'Server added.';
  resetForm();
  await loadTargets();
});

async function deleteTarget(id) {
  const t = targetsCache.find(x => x.id === id);
  const label = t ? (t.name || t.id) : id;
  if (!confirm(`Delete "${label}"? History stays in the database but probing stops.`)) return;
  const res = await fetch(`/api/targets/${encodeURIComponent(id)}`, { method: 'DELETE' });
  if (!res.ok && res.status !== 204) { alert(await res.text()); return; }
  await loadTargets();
}

// ===== Export =====
document.getElementById('btnExport').onclick = () => {
  if (selected.size === 0) { alert('Select at least one server to export.'); return; }
  const toExport = targetsCache.filter(t => selected.has(t.id)).map(t => {
    const copy = { ...t };
    delete copy.id;
    return copy;
  });
  const blob = new Blob([JSON.stringify(toExport, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mcmon-servers.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

// ===== Import =====
document.getElementById('btnImportOpen').onclick = () => document.getElementById('importFile').click();

document.getElementById('importFile').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      let parsed = JSON.parse(reader.result);
      if (!Array.isArray(parsed)) parsed = [parsed];
      importData = parsed;
      renderImportModal();
      document.getElementById('importModal').classList.add('open');
    } catch (err) { alert('Invalid JSON file: ' + err.message); }
    document.getElementById('importFile').value = '';
  };
  reader.readAsText(file);
};

function renderImportModal() {
  importSelected = new Set(importData.map((_, i) => i));
  const tbody = document.querySelector('#importTable tbody');
  tbody.innerHTML = '';
  importData.forEach((t, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" class="impsel" data-idx="${i}" checked></td>
      <td><strong>${esc(t.name || t.id || '(unnamed)')}</strong></td>
      <td>${esc(t.host || '?')}:${t.port || 25565}</td>
      <td>${t.interval_sec || 60}s</td>`;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('.impsel').forEach(cb => cb.onchange = () => {
    if (cb.checked) importSelected.add(+cb.dataset.idx); else importSelected.delete(+cb.dataset.idx);
    document.getElementById('importSelectAll').checked = importSelected.size === importData.length;
  });
  document.getElementById('importSelectAll').checked = true;
  document.getElementById('importErr').textContent = '';
}

document.getElementById('importSelectAll').onchange = function() {
  if (this.checked) importData.forEach((_, i) => importSelected.add(i));
  else importSelected.clear();
  document.querySelectorAll('#importTable .impsel').forEach((cb, i) => cb.checked = importSelected.has(i));
};

document.getElementById('importCancel').onclick = () => document.getElementById('importModal').classList.remove('open');

document.getElementById('importConfirm').onclick = async () => {
  if (importSelected.size === 0) { document.getElementById('importErr').textContent = 'Select at least one server.'; return; }
  const toImport = importData.filter((_, i) => importSelected.has(i));
  const res = await fetch('/api/targets/import', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(toImport),
  });
  if (!res.ok) { document.getElementById('importErr').textContent = await res.text(); return; }
  document.getElementById('importModal').classList.remove('open');
  await loadTargets();
};

document.getElementById('importModal').onclick = (e) => {
  if (e.target === document.getElementById('importModal'))
    document.getElementById('importModal').classList.remove('open');
};

// ===== Init =====
(async () => { resetForm(); await loadTargets(); })();
</script>

</body>
</html>
