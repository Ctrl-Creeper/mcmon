<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Server Detail - mcmon</title>
<link rel="stylesheet" href="/style.css" />
<script src="/vendor/chart.umd.js"></script>
<script src="/vendor/chartjs-plugin-zoom.min.js"></script>
<script src="/vendor/hammer.min.js"></script>
<style>
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; margin-bottom: 16px; transition: color 0.2s; }
  .back-link:hover { color: var(--accent); }
  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .detail-header .name { font-size: 22px; font-weight: 700; }
  .detail-header .host { font-size: 14px; color: var(--text-faint); }
  .detail-sub { font-size: 12px; color: var(--text-faint); margin-bottom: 16px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
  .metric-card { cursor: pointer; min-height: 190px; }
  .metric-card h3 { font-size: 13px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .metric-card .big { font-size: 28px; font-weight: 750; margin-bottom: 10px; }
  .metric-card canvas { height: 92px !important; }
</style>
</head>
<body>

<nav>
  <span class="logo">⚡ MCMon</span>
  <a href="/">Dashboard</a>
  <a href="/servers.html">Servers</a>
  <a href="/remote.html">Remote</a>
  <a href="/settings.html">Settings</a>
  <span class="spacer"></span>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="wrap">
  <a href="/" class="back-link" id="backLink">← Back to Dashboard</a>

  <div class="card" id="infoCard">
    <div class="detail-header">
      <span class="dot" id="statusDot"></span>
      <span class="name" id="serverName">—</span>
      <span class="host" id="serverHost">—</span>
    </div>
    <div class="detail-sub" id="serverConfig"></div>
  </div>

  <div id="overviewView">
    <div class="metric-grid" id="metricGrid"></div>
  </div>

  <div id="metricView" style="display:none;">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label" id="metricLabel">Metric</div><div class="stat-value" id="metricCurrent">—</div></div>
      <div class="stat-card"><div class="stat-label">Samples</div><div class="stat-value" id="metricSamples">—</div></div>
      <div class="stat-card"><div class="stat-label">Range</div><div class="stat-value" id="metricRange">—</div></div>
    </div>
    <div class="card">
      <div class="row">
        <div class="row" id="rangeButtons"></div>
        <span class="spacer"></span>
        <button class="btn ghost" id="resetZoom">↺ Reset zoom</button>
      </div>
    </div>
    <div class="card">
      <canvas id="chart" height="110"></canvas>
      <div class="muted" style="margin-top:12px;">
        Scroll zoom · Drag pan · Shift+drag box zoom · Double-click reset.
      </div>
    </div>
  </div>
</div>

<script>
const metricDefs = {
  online: { label: 'Online', color: 'green' },
  players: { label: 'Players', color: 'accent' },
  latency: { label: 'Latency', color: 'green' },
  loss: { label: 'Loss', color: 'red' },
};
const ranges = ['1h','6h','12h','1d','7d','30d'];
const params = new URLSearchParams(location.search);
const targetId = params.get('id');
let currentMetric = params.get('metric');
let currentRange = '1h';
let targetInfo = null;
let metricCache = {};
let charts = {};
let chart = null;
if (!targetId) location.href = '/';

const themeBtn = document.getElementById('themeBtn');
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('mcmon-theme', dark ? 'dark' : 'light');
}
themeBtn.onclick = () => { applyTheme(!document.body.classList.contains('dark')); refresh(); };
applyTheme(localStorage.getItem('mcmon-theme') === 'dark' || (!localStorage.getItem('mcmon-theme') && matchMedia('(prefers-color-scheme:dark)').matches));

function colors() {
  const dark = document.body.classList.contains('dark');
  return {
    green: dark ? '#8be98b' : '#00a040',
    red: dark ? '#ff7777' : '#d92828',
    accent: dark ? '#b8a6ff' : '#6b4ee6',
    grid: dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    tick: dark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.45)',
  };
}

async function loadTarget() {
  const targets = await fetch('/api/targets').then(r => r.json()) || [];
  targetInfo = (targets || []).find(t => t.id === targetId);
  if (!targetInfo) {
    document.getElementById('serverName').textContent = 'Server not found';
    return;
  }
  document.title = `${targetInfo.name || targetInfo.id} - mcmon`;
  document.getElementById('serverName').textContent = targetInfo.name || targetInfo.id;
  document.getElementById('serverHost').textContent = `${targetInfo.host}:${targetInfo.port}`;
  document.getElementById('serverConfig').textContent = `Timeout: ${targetInfo.timeout_ms}ms`;
}

function monitorDefaults(t) {
  const m = t.monitors || {};
  const interval = t.interval_sec || 60;
  return {
    online: { enabled: true, interval_sec: interval, ...(m.online || {}) },
    players: { enabled: true, interval_sec: interval, ...(m.players || {}) },
    latency: { enabled: true, interval_sec: interval, ...(m.latency || {}) },
    loss: { enabled: true, interval_sec: interval, ...(m.loss || {}) },
  };
}

function enabledMetrics() {
  const m = monitorDefaults(targetInfo || {});
  return Object.keys(metricDefs).filter(k => m[k] && m[k].enabled);
}

async function loadMetric(metric, range = '1h') {
  const data = await fetch(`/api/metrics?target=${encodeURIComponent(targetId)}&metric=${metric}&range=${range}`).then(r => r.json());
  metricCache[`${metric}:${range}`] = data || [];
  return data || [];
}

async function refresh() {
  if (!targetInfo) return;
  if (currentMetric) await renderMetricView();
  else await renderOverview();
}

async function renderOverview() {
  document.getElementById('overviewView').style.display = '';
  document.getElementById('metricView').style.display = 'none';
  document.getElementById('backLink').href = '/';
  document.getElementById('backLink').textContent = '← Back to Dashboard';
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  await Promise.all(enabledMetrics().map(m => loadMetric(m)));
  updateStatusDot();
  const grid = document.getElementById('metricGrid');
  grid.innerHTML = enabledMetrics().map(metric => metricCardHTML(metric)).join('');
  enabledMetrics().forEach(renderSmallChart);
  grid.querySelectorAll('[data-metric]').forEach(card => {
    card.onclick = () => { location.href = `/detail.html?id=${encodeURIComponent(targetId)}&metric=${card.dataset.metric}`; };
  });
}

function metricCardHTML(metric) {
  const arr = metricCache[`${metric}:1h`] || [];
  const last = arr.length ? arr[arr.length - 1] : null;
  return `
    <div class="card metric-card" data-metric="${metric}">
      <h3>${metricDefs[metric].label}</h3>
      <div class="big">${metricValue(metric, last)}</div>
      <canvas id="small-${metric}"></canvas>
    </div>
  `;
}

function renderSmallChart(metric) {
  const arr = metricCache[`${metric}:1h`] || [];
  const cc = colors();
  const def = metricDefs[metric];
  charts[metric] = new Chart(document.getElementById(`small-${metric}`), {
    type: metric === 'online' ? 'bar' : 'line',
    data: { labels: arr.map(x => new Date(x.Ts * 1000).toLocaleTimeString()), datasets: [{ data: arr.map(x => x.Value), borderColor: cc[def.color], backgroundColor: metric === 'online' ? cc[def.color] : 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.3 }] },
    options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: thumbnailScales(metric, cc) },
  });
}

function thumbnailScales(metric, cc) {
  return {
    x: {
      display: true,
      grid: { display: false },
      ticks: { color: cc.tick, maxTicksLimit: 3, maxRotation: 0, autoSkip: true, font: { size: 10 } },
    },
    y: {
      display: true,
      min: metric === 'online' ? 0 : 0,
      max: metric === 'online' ? 1 : undefined,
      grid: { color: cc.grid, drawTicks: false },
      border: { display: false },
      ticks: { color: cc.tick, maxTicksLimit: 3, font: { size: 10 }, callback: value => formatTick(metric, value) },
    },
  };
}

function formatTick(metric, value) {
  const n = Number(value);
  if (metric === 'online') return n === 1 ? '1' : n === 0 ? '0' : '';
  if (metric === 'latency') return `${Math.round(n)}ms`;
  if (metric === 'loss') return `${Math.round(n * 100)}%`;
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

async function renderMetricView() {
  if (!metricDefs[currentMetric]) currentMetric = 'latency';
  document.getElementById('overviewView').style.display = 'none';
  document.getElementById('metricView').style.display = '';
  document.getElementById('backLink').href = `/detail.html?id=${encodeURIComponent(targetId)}`;
  document.getElementById('backLink').textContent = '← Back to Server Overview';
  renderRangeButtons();
  const loads = [loadMetric(currentMetric, currentRange)];
  if (currentMetric !== 'online' && monitorDefaults(targetInfo).online.enabled) {
    loads.push(loadMetric('online', currentRange));
  }
  const [arr] = await Promise.all(loads);
  updateStatusDot();
  const last = arr.length ? arr[arr.length - 1] : null;
  document.getElementById('metricLabel').textContent = metricDefs[currentMetric].label;
  document.getElementById('metricCurrent').textContent = metricValue(currentMetric, last);
  document.getElementById('metricSamples').textContent = arr.length;
  document.getElementById('metricRange').textContent = currentRange;
  renderMainChart(arr);
}

function renderRangeButtons() {
  const c = document.getElementById('rangeButtons');
  c.innerHTML = '';
  ranges.forEach(r => {
    const b = document.createElement('button');
    b.className = 'btn' + (r === currentRange ? ' active' : '');
    b.textContent = r;
    b.onclick = () => { currentRange = r; renderMetricView(); };
    c.appendChild(b);
  });
}

function renderMainChart(arr) {
  if (chart) chart.destroy();
  const cc = colors();
  const def = metricDefs[currentMetric];
  const data = arr.map(x => x.Value);
  chart = new Chart(document.getElementById('chart'), {
    type: currentMetric === 'online' ? 'bar' : 'line',
    data: { labels: arr.map(x => new Date(x.Ts * 1000).toLocaleString()), datasets: [{ label: metricDefs[currentMetric].label, data, borderColor: cc[def.color], backgroundColor: currentMetric === 'online' ? cc[def.color] : 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.25 }] },
    options: {
      animation: false,
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { ticks: { color: cc.tick, maxTicksLimit: 14 }, grid: { color: cc.grid } },
        y: { min: currentMetric === 'online' ? 0 : 0, max: currentMetric === 'online' ? 1 : undefined, ticks: { color: cc.tick }, grid: { color: cc.grid } },
      },
      plugins: {
        legend: { labels: { color: cc.tick } },
        zoom: {
          pan: { enabled: true, mode: 'x' },
          zoom: { wheel: { enabled: true, speed: 0.05 }, pinch: { enabled: true }, drag: { enabled: true, modifierKey: 'shift' }, mode: 'x' },
        },
      },
    },
  });
}

document.getElementById('resetZoom').onclick = () => { if (chart) chart.resetZoom(); };

function updateStatusDot() {
  if (!monitorDefaults(targetInfo || {}).online.enabled) {
    document.getElementById('statusDot').className = 'dot unknown';
    return;
  }
  const online = metricCache['online:1h'] || metricCache[`online:${currentRange}`] || [];
  const last = online.length ? online[online.length - 1] : null;
  document.getElementById('statusDot').className = 'dot ' + (!last ? 'unknown' : last.Value === 1 ? 'online' : 'offline');
}

function metricValue(metric, sm) {
  if (!sm) return '—';
  if (metric === 'online') return sm.Value === 1 ? 'Online' : 'Offline';
  if (metric === 'players') {
    if (sm.Value == null) return '—';
    const extra = parseExtra(sm);
    return extra.max ? `${sm.Value}/${extra.max}` : String(sm.Value);
  }
  if (metric === 'latency') return sm.Value != null ? `${sm.Value.toFixed(1)} ms` : '—';
  if (metric === 'loss') return sm.Value != null ? `${(sm.Value * 100).toFixed(1)}%` : '—';
  return '—';
}

function parseExtra(sm) {
  try { return sm && sm.Extra ? JSON.parse(sm.Extra) : {}; } catch { return {}; }
}

(async () => {
  await loadTarget();
  await refresh();
  setInterval(refresh, 30000);
})();
</script>
</body>
</html>
