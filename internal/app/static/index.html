<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MC Server Monitor</title>
<link rel="stylesheet" href="/style.css" />
<script src="/vendor/chart.umd.js"></script>
<style>
  .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 16px; }
  .server-card { cursor: pointer; position: relative; }
  .server-card:hover { box-shadow: var(--shadow-lg); }
  .server-card .header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .server-card .name { font-size: 15px; font-weight: 600; }
  .server-card .host { font-size: 12px; color: var(--text-faint); }
  .metric-strip { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
  .metric-tile { border: 1px solid var(--border-light); border-radius: var(--radius); padding: 10px; background: var(--bg-input); min-height: 104px; }
  .metric-title { display: flex; justify-content: space-between; gap: 8px; color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  .metric-value { font-size: 20px; font-weight: 700; margin: 4px 0 6px; }
  .metric-spark { height: 72px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-faint); }
  .empty-state a { color: var(--accent); }
  @media (max-width: 560px) { .server-grid, .metric-strip { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <span class="logo">⚡ MCMon</span>
  <a href="/" class="active">Dashboard</a>
  <a href="/servers.html">Servers</a>
  <a href="/remote.html">Remote</a>
  <a href="/settings.html">Settings</a>
  <span class="spacer"></span>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="wrap">
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Servers</div><div class="stat-value accent" id="statTotal">-</div></div>
    <div class="stat-card"><div class="stat-label">Online</div><div class="stat-value green" id="statOnline">-</div></div>
    <div class="stat-card"><div class="stat-label">Players</div><div class="stat-value" id="statPlayers">-</div></div>
    <div class="stat-card"><div class="stat-label">Avg Latency</div><div class="stat-value" id="statLatency">-</div></div>
  </div>

  <div class="server-grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    No servers configured yet. <a href="/servers.html">Add one →</a>
  </div>
</div>

<script>
const metrics = {
  online: { label: 'Online' },
  players: { label: 'Players' },
  latency: { label: 'Latency' },
  loss: { label: 'Loss' },
};
const themeBtn = document.getElementById('themeBtn');
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('mcmon-theme', dark ? 'dark' : 'light');
}
themeBtn.onclick = () => { applyTheme(!document.body.classList.contains('dark')); renderAll(); };
applyTheme(localStorage.getItem('mcmon-theme') === 'dark' || (!localStorage.getItem('mcmon-theme') && matchMedia('(prefers-color-scheme:dark)').matches));

function chartColors() {
  const dark = document.body.classList.contains('dark');
  return {
    green: dark ? '#8be98b' : '#00a040',
    line: dark ? '#8be98b' : '#00a040',
    red: dark ? '#ff7777' : '#d92828',
    accent: dark ? '#b8a6ff' : '#6b4ee6',
    grid: dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    tick: dark ? 'rgba(255,255,255,0.42)' : 'rgba(0,0,0,0.42)',
  };
}

let targets = [];
let metricCache = {};
let charts = {};

async function loadAll() {
  targets = await fetch('/api/targets').then(r => r.json()) || [];
  if (!Array.isArray(targets)) targets = [];
  metricCache = {};
  await Promise.all(targets.flatMap(t => enabledMetrics(t).map(async metric => {
    const data = await fetch(`/api/metrics?target=${encodeURIComponent(t.id)}&metric=${metric}&range=1h`).then(r => r.json());
    metricCache[`${t.id}:${metric}`] = data || [];
  })));
  updateStats();
  renderAll();
}

function monitorDefaults(t) {
  const m = t.monitors || {};
  const interval = t.interval_sec || 60;
  return {
    online: { enabled: true, interval_sec: interval, ...(m.online || {}) },
    players: { enabled: true, interval_sec: interval, ...(m.players || {}) },
    latency: { enabled: true, interval_sec: interval, ...(m.latency || {}) },
    loss: { enabled: true, interval_sec: interval, ...(m.loss || {}) },
  };
}

function enabledMetrics(t) {
  const m = monitorDefaults(t);
  return Object.keys(metrics).filter(k => m[k] && m[k].enabled);
}

function updateStats() {
  let online = 0, players = 0, maxPlayers = 0, latencySum = 0, latencyCount = 0;
  targets.forEach(t => {
    const o = lastMetric(t.id, 'online');
    if (o && o.Value === 1) online++;
    const p = lastMetric(t.id, 'players');
    if (p && p.Value != null) {
      players += p.Value;
      const extra = parseExtra(p);
      if (extra.max) maxPlayers += extra.max;
    }
    const l = lastMetric(t.id, 'latency');
    if (l && l.Value != null) { latencySum += l.Value; latencyCount++; }
  });
  document.getElementById('statTotal').textContent = targets.length;
  document.getElementById('statOnline').textContent = online;
  document.getElementById('statPlayers').textContent = maxPlayers ? `${players}/${maxPlayers}` : players || '—';
  document.getElementById('statLatency').textContent = latencyCount ? `${(latencySum / latencyCount).toFixed(1)} ms` : '—';
}

function renderAll() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  if (!targets.length) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = '';
  targets.forEach(t => {
    const onlineSample = lastMetric(t.id, 'online');
    const isOnline = onlineSample && onlineSample.Value === 1;
    const card = document.createElement('div');
    card.className = 'card server-card';
    card.onclick = () => { location.href = `/detail.html?id=${encodeURIComponent(t.id)}`; };
    card.innerHTML = `
      <div class="header">
        <span class="dot ${isOnline ? 'online' : 'offline'}"></span>
        <span class="name">${esc(t.name || t.id)}</span>
        <span class="host">${esc(t.host)}:${t.port}</span>
      </div>
      <div class="metric-strip">
        ${enabledMetrics(t).map(metric => metricTileHTML(t, metric)).join('')}
      </div>
    `;
    grid.appendChild(card);
    enabledMetrics(t).forEach(metric => renderSpark(t.id, metric));
  });
}

function metricTileHTML(t, metric) {
  const last = lastMetric(t.id, metric);
  return `
    <div class="metric-tile">
      <div class="metric-title"><span>${metrics[metric].label}</span><span>${monitorDefaults(t)[metric].interval_sec}s</span></div>
      <div class="metric-value">${metricValue(metric, last)}</div>
      <div class="metric-spark"><canvas id="spark-${t.id}-${metric}"></canvas></div>
    </div>
  `;
}

function metricValue(metric, sm) {
  if (!sm) return '—';
  if (metric === 'online') return sm.Value === 1 ? 'Online' : 'Offline';
  if (metric === 'players') {
    if (sm.Value == null) return '—';
    const extra = parseExtra(sm);
    return extra.max ? `${sm.Value}/${extra.max}` : String(sm.Value);
  }
  if (metric === 'latency') return sm.Value != null ? `${sm.Value.toFixed(1)} ms` : '—';
  if (metric === 'loss') return sm.Value != null ? `${(sm.Value * 100).toFixed(1)}%` : '—';
  return '—';
}

function renderSpark(targetID, metric) {
  const canvas = document.getElementById(`spark-${targetID}-${metric}`);
  if (!canvas) return;
  const arr = metricCache[`${targetID}:${metric}`] || [];
  const cc = chartColors();
  const data = arr.map(d => d.Value);
  const color = metric === 'online' ? cc.green : metric === 'loss' ? cc.red : metric === 'players' ? cc.accent : cc.line;
  charts[`${targetID}:${metric}`] = new Chart(canvas, {
    type: metric === 'online' ? 'bar' : 'line',
    data: { labels: arr.map(d => new Date(d.Ts * 1000).toLocaleTimeString()), datasets: [{ data, borderColor: color, backgroundColor: metric === 'online' ? color : 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.3 }] },
    options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: thumbnailScales(metric, cc) },
  });
}

function thumbnailScales(metric, cc) {
  return {
    x: {
      display: true,
      grid: { display: false },
      ticks: { color: cc.tick, maxTicksLimit: 3, maxRotation: 0, autoSkip: true, font: { size: 10 } },
    },
    y: {
      display: true,
      min: metric === 'online' ? 0 : 0,
      max: metric === 'online' ? 1 : undefined,
      grid: { color: cc.grid, drawTicks: false },
      border: { display: false },
      ticks: { color: cc.tick, maxTicksLimit: 3, font: { size: 10 }, callback: value => formatTick(metric, value) },
    },
  };
}

function formatTick(metric, value) {
  const n = Number(value);
  if (metric === 'online') return n === 1 ? '1' : n === 0 ? '0' : '';
  if (metric === 'latency') return `${Math.round(n)}ms`;
  if (metric === 'loss') return `${Math.round(n * 100)}%`;
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

function lastMetric(targetID, metric) {
  const arr = metricCache[`${targetID}:${metric}`] || [];
  return arr.length ? arr[arr.length - 1] : null;
}

function parseExtra(sm) {
  try { return sm && sm.Extra ? JSON.parse(sm.Extra) : {}; } catch { return {}; }
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

(async () => {
  await loadAll();
  setInterval(loadAll, 30000);
})();
</script>
</body>
</html>
